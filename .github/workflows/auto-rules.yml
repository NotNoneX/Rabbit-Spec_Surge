name: Auto-Surge-Rules

# 触发器配置
on:
  schedule:
    # 定时任务：每天 UTC 时间 23:00 执行（北京时间 07:00）
    - cron: '0 23 * * *'
  # 允许手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    
    # 强制所有 JavaScript Actions 使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      # 步骤 1：检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2：下载、合并手动规则、排除指定规则并归档
      - name: Download, Merge and Filter Rules
        run: |
          # 创建输出目录及手动规则存储目录
          mkdir -p Rules/Manual
          
          # 获取北京时间
          UPDATE_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S")
          
          # 封装处理函数
          process_rule() {
            local source_file=$1
            local target_name=$2
            local display_name=$3
            
            local target_path="Rules/$target_name"
            local filename_no_ext="${target_name%.*}"
            local manual_file="Rules/Manual/${filename_no_ext}.txt"
            local exclude_file="Rules/Manual/${filename_no_ext}.exclude.txt"
            
            # 1. 写入 Header 信息
            echo "# NAME: $display_name" > "$target_path"
            echo "# AUTHOR: Rabbit-Spec" >> "$target_path"
            echo "# REPO: https://github.com/Rabbit-Spec/Surge" >> "$target_path"
            echo "# UPDATED: $UPDATE_TIME" >> "$target_path"
            echo "" >> "$target_path"
            
            # 2. 合并手动追加规则 (Rules/Manual/*.txt)
            if [ -f "$manual_file" ]; then
              echo "# ======= 手动维护规则 ========" >> "$target_path"
              cat "$manual_file" >> "$target_path"
              echo "" >> "$target_path"
            fi
            
            # 3. 追加上游同步规则并执行排除过滤
            echo "# ======= 上游同步规则 ========" >> "$target_path"
            
            if [ -f "$exclude_file" ] && [ -s "$exclude_file" ]; then
              # 如果排除文件存在且不为空，执行过滤逻辑
              # -v: 排除匹配项, -F: 纯文本匹配, -f: 从文件读取关键字
              curl -sL "$BASE_URL/$source_file" | grep -vFf "$exclude_file" >> "$target_path"
            else
              # 否则直接追加全量上游规则
              curl -sL "$BASE_URL/$source_file" >> "$target_path"
            fi
          }
          
          # --- 第一部分：Loyalsoldier 仓库规则 ---
          BASE_URL="https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release"
          process_rule "proxy.txt" "Proxy.list" "Proxy"
          process_rule "direct.txt" "China.list" "China"
          process_rule "cncidr.txt" "ChinaCIDR.list" "ChinaCIDR"
          
          # --- 第二部分：EAlyce 仓库规则 ---
          BASE_URL="https://raw.githubusercontent.com/EAlyce/conf/refs/heads/main/Rule"
          process_rule "OpenAI.list" "AIGC.list" "AIGC"

      # 步骤 3：Git 提交与推送到远程仓库
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add Rules/
          
          if ! git diff --staged --quiet; then
            COMMIT_DATE=$(TZ="Asia/Shanghai" date +"%Y.%m.%d")
            git commit -m "$COMMIT_DATE Auto-update Surge Rules from multi-sources"
            git push
          fi
